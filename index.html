<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="vignette"></div>

    <main id="app">

        <section class="hero reveal">
            <img class="icon" src="src/icon.jpg">
            <h1 class="name">Hi, I'm Pablo</h1>
            <div class="sub">Bulder and Modeller</div>
        </section>

        <section class="stats reveal">
            <div class="stat-row">
                <img class="hourglass" src="src/hourglass.png">
                <div class="stat-text">
                    <span class="value">32h</span>
                    <span class="label">in Blender</span>
                </div>
            </div>
        </section>

        <section class="about reveal">
            <h2>About me</h2>
            <p id="aboutText"></p>
        </section>

        <div class="separator reveal"></div>

        <section class="portfolio reveal">

            <div class="entry">

                <div class="entry-bg"></div>

                <div class="entry-content">
                    <h3>Project 1</h3>

                    <img class="project-media" src="src/kgboom.gif">

                    <p id="typed"></p>
                </div>

            </div>

        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
