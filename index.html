<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <div class="vignette"></div>

    <main id="app">

        <section class="hero reveal">
            <img class="icon" src="src/icon.png">
            <h1 class="name">Hi, I'm Pablo</h1>
            <div class="sub">Bulder and Modeller</div>
        </section>

        <section class="stats reveal">
            <div class="stat-row">
                <img class="hourglass" src="src/hourglass.png">
                <div class="stat-text">
                    <span class="value">3 months</span>
                    <span class="label">in Blender</span>
                </div>
            </div>
        </section>

        <section class="about reveal">
            <h2>About me</h2>
            <p id="aboutText"></p>
        </section>

        <div class="separator reveal"></div>

        <section class="portfolio reveal">

            <div class="entry">

                <div class="entry-bg"></div>

                <div class="entry-content">
                    <h3>Bladed Weapons</h3>
                    <img class="project-media" src="src/project1.png">
                    <p id="typed"></p>
                </div>

            </div>

        </section>

        <div class="separator reveal"></div>

        <section class="socials reveal">
            <h2>Socials</h2>

            <div class="social-row">
                <a class="social-item" href="https://discord.com/users/1317154158213595207" target="_blank">
                    <img src="./src/discordlogo.webp">
                    <span style="color:#5665ed">Discord</span>
                </a>

                <a class="social-item" href="https://mail.google.com/mail/?view=cm&to=pablooopabloooo0623@gmail.com">
                    <img src="./src/maillogo.png">
                    <span style="color:#ff0000">Email</span>
                </a>

                <a class="social-item" href="https://www.roblox.com/users/727632085/profile" target="_blank">
                    <img src="./src/robloxlogo.png">
                    <span style="color:#ffffff">Roblox</span>
                </a>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
